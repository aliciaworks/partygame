<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PartyGame - Web Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #0a0e27;
      color: #e0e0e0;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
    }

    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      font-size: 14px;
      z-index: 10;
    }

    .hud {
      background: rgba(10, 14, 39, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 16px;
      backdrop-filter: blur(10px);
    }

    .hud-row {
      display: flex;
      gap: 20px;
      margin-bottom: 8px;
    }

    .hud-item {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .health-bar {
      width: 150px;
      height: 8px;
      background: #333;
      border-radius: 4px;
      overflow: hidden;
    }

    .health-fill {
      height: 100%;
      background: linear-gradient(90deg, #4ade80, #22c55e);
      transition: width 0.1s ease-out;
    }

    #connection-status {
      position: absolute;
      bottom: 20px;
      right: 20px;
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }

    .connected {
      background: rgba(74, 222, 128, 0.2);
      color: #4ade80;
      border: 1px solid #4ade80;
    }

    .connecting {
      background: rgba(251, 191, 36, 0.2);
      color: #fbbf24;
      border: 1px solid #fbbf24;
    }

    .disconnected {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      border: 1px solid #ef4444;
    }

    .loading {
      text-align: center;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top-color: #4ade80;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .init-screen {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .init-screen.hidden {
      display: none;
    }

    .init-content {
      text-align: center;
    }

    .init-title {
      font-size: 2.5em;
      font-weight: 700;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #4ade80, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .init-description {
      font-size: 1.1em;
      color: #93a4c3;
      margin-bottom: 40px;
      max-width: 400px;
    }

    .init-input {
      background: rgba(16, 26, 47, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px 16px;
      color: #e0e0e0;
      margin-bottom: 12px;
      width: 300px;
      font-size: 1em;
    }

    .init-button {
      background: linear-gradient(135deg, #4ade80, #22c55e);
      border: none;
      border-radius: 8px;
      padding: 12px 32px;
      color: #0a0e27;
      font-weight: 600;
      cursor: pointer;
      font-size: 1em;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .init-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(74, 222, 128, 0.3);
    }

    .init-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div id="init-screen" class="init-screen">
    <div class="init-content">
      <div class="init-title">🎮 PartyGame</div>
      <div class="init-description">Enter your player name to join the game</div>
      
      <input 
        type="text" 
        id="player-name-input" 
        class="init-input" 
        placeholder="Player name..."
        maxlength="32"
      />
      
      <input 
        type="text" 
        id="backend-url-input" 
        class="init-input" 
        placeholder="Backend URL (http://localhost:8787)"
      />
      
      <button id="join-button" class="init-button">Join Game</button>
      
      <div id="init-error" style="color: #ef4444; margin-top: 16px; display: none;"></div>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <div id="ui">
    <div class="hud">
      <div class="hud-row">
        <div class="hud-item">
          <span>Health:</span>
          <div class="health-bar">
            <div class="health-fill" id="health-fill" style="width: 100%"></div>
          </div>
          <span id="health-text">100/100</span>
        </div>
      </div>
      <div class="hud-row">
        <div class="hud-item">
          <span>Position:</span>
          <span id="position-text">0, 0</span>
        </div>
      </div>
      <div class="hud-row">
        <div class="hud-item">
          <span>Players Online:</span>
          <span id="players-text">0</span>
        </div>
      </div>
    </div>
  </div>

  <div id="connection-status" class="connecting">Loading...</div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
